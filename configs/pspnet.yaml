experiment_name: pspnet_consensus
epochs: 200
batch_size: 8
val_batch_size: 4
learning_rate: 1e-2
weight_decay: 1e-4
optimizer: sgd
momentum: 0.9
lr_schedule: poly
poly_power: 0.9
num_workers: 8
device: cuda
base_output_dir: ./outputs/runs
random_seed: 42
deterministic: false

data_root: ./data
consensus_root: ./data/consensus
image_subdirs: [Train_imgs]
supervised_image_subdirs: [Train_imgs]

split_mode: final_80_10_10
split_manifest_path: ./outputs/splits/gleason_consensus_split_80_10_10.json
enforce_val_class_presence: true
val_min_g3_pos_images: 1
val_min_g4_pos_images: 1
val_min_g5_pos_images: 1
split_search_max_attempts: 100

renormalize_probs: true
enforce_background_ignore: true
resize_short_side: 1024
train_crop_enabled: true
train_crop_size: [800, 800]
train_resize_random_scale_enabled: false
train_resize_random_scale_min: 0.9
train_resize_random_scale_max: 1.1
inference_resize_short_side: 1024
inference_mode: resized_full
resized_sliding_window_patch_size: [800, 800]
resized_sliding_window_overlap: 0.25
otsu_close_radius: 3
otsu_min_object_size: 4096
otsu_min_hole_size: 4096
probs_eps: 1e-8

# Train-time augmentation (MONAI, train split only)
transforms_enabled: true
transforms_profile: medium
transforms_seed_sync: true
transforms_profiles:
  light:
    flip_h: 0.50
    flip_v: 0.50
    rotate90: 0.20
    affine: 0.15
    scale_intensity: 0.15
    adjust_contrast: 0.10
    gaussian_noise: 0.10
    gaussian_smooth: 0.05
    shift_intensity: 0.05
  medium:
    flip_h: 0.50
    flip_v: 0.50
    rotate90: 0.30
    affine: 0.25
    scale_intensity: 0.20
    adjust_contrast: 0.15
    gaussian_noise: 0.15
    gaussian_smooth: 0.10
    shift_intensity: 0.10
  strong:
    flip_h: 0.50
    flip_v: 0.50
    rotate90: 0.40
    affine: 0.35
    scale_intensity: 0.25
    adjust_contrast: 0.20
    gaussian_noise: 0.20
    gaussian_smooth: 0.15
    shift_intensity: 0.15
transforms_prob: {}
transforms_affine_rotate_range: [0.12]
transforms_affine_translate_range: [32, 32]
transforms_affine_scale_range: [0.08, 0.08]
transforms_scale_intensity_factors: 0.10
transforms_adjust_contrast_gamma: [0.85, 1.15]
transforms_gaussian_noise_mean: 0.0
transforms_gaussian_noise_std: 0.03
transforms_gaussian_smooth_sigma_x: [0.25, 1.00]
transforms_gaussian_smooth_sigma_y: [0.25, 1.00]
transforms_shift_intensity_offsets: [-0.08, 0.08]

model: pspnet
spatial_dims: 2
input_channels: 3
out_channels: 4
pspnet_use_aux: true
pspnet_aux_weight: 0.5
pspnet_loss_mode: gleason_ce_soft
pspnet_soft_term: ce
pspnet_soft_weight: 0.2
pspnet_pretrained_backbone: true
pspnet_encoder_name: resnet101
pspnet_encoder_weights: imagenet
deep_supervision: false

soft_label_loss: ce
loss_variant: focal_dice
lambda_soft: 1.0
lambda_dice: 1.0
loss_schedule_enabled: true
loss_schedule_transition_epoch: 12
lambda_soft_warmup: 1.2
lambda_dice_warmup: 0.8
lambda_soft_final: 0.8
lambda_dice_final: 1.2
use_confidence_mask: true
confidence_threshold: 0.70
include_background_in_dice: false
exclude_absent_classes_in_dice_loss: true
class_loss_weights: [1.0, 1.6, 1.3, 4.5]
grade5_boost: 2.0

qc_policy: warn_downweight
qc_fail_keys: [hard_fail, failed, qc_failed]
qc_suspicious_keys: [suspicious, needs_review]
qc_downweight_factor: 0.7
qc_per_rater_penalty: 0.1
qc_min_weight: 0.2

val_every: 1
val_start_epoch: 1
eval_leave_one_rater_out: false

use_amp: true
amp_dtype: fp16
use_compile: false
keep_last_checkpoints: 5
# Optional warm-start source (partial load; ignored when resume_checkpoint/--resume is set)
pretrained_checkpoint: null

best_ckpt_w_macro_dice: 0.45
best_ckpt_w_weighted_macro_dice: 0.15
best_ckpt_w_dice_g5: 0.30
best_ckpt_w_sensitivity: 0.10
best_ckpt_metric_source: raw

metrics:
  track_keys:
    - macro_dice
    - macro_f1
    - micro_f1
    - cohen_kappa
    - challenge_score
    - weighted_macro_dice
    - grade5_dice
    - miou
    - grade5_iou
    - dice_benign
    - dice_g3
    - dice_g4
    - dice_g5
    - iou_benign
    - iou_g3
    - iou_g4
    - iou_g5
    - iou_tumor_vs_benign
    - sensitivity
    - precision
    - ignored_pixel_fraction
    - tumor_pixels_ignored_fraction
    - hd95_mean
    - hd95_g3
    - hd95_g4
    - hd95_g5
    - asd_mean
    - asd_g3
    - asd_g4
    - asd_g5
  best_checkpoint_metric: challenge_score
  best_checkpoint_source: raw
  include_boundary_metrics: true
  boundary:
    hausdorff_variant: hd95
    hausdorff_percentile: 95
    include_background: false
    symmetric_asd: true
nan_recovery_log_every: 1

early_stopping_patience: 40
early_stopping_min_delta: 0.001

post_min_component_size_g3: 32
post_min_component_size_g4: 32
post_min_component_size_g5: 16

oversample_tumor_positive_factor: 1.25
oversample_grade5_factor: 2.0
oversample_hard_case_factor: 1.20

wandb_enabled: true
wandb_mode: online
wandb_project: prostate-lesion-segmentation
wandb_entity: ""
wandb_run_name: ""
wandb_group: pspnet
wandb_tags: [pspnet, consensus, segmentation]
wandb_log_config: true
wandb_strict: false

viz_enabled: true
viz_every_n_epochs: 5
viz_num_cases: 8
viz_output_subdir: val_viz
viz_log_wandb: true
viz_prediction_source: both
