experiment_name: deconver_consensus
epochs: 200
batch_size: 1
val_batch_size: 1
learning_rate: 2e-4
weight_decay: 1e-5
num_workers: 2
device: cuda
base_output_dir: ./outputs/runs
random_seed: 42
deterministic: false

# Consensus dataset roots
# data_root contains Train_imgs/ and Test_imgs/
# consensus_root contains per-image consensus outputs
data_root: ./data
consensus_root: ./data/consensus
image_subdirs: [Train_imgs]
supervised_image_subdirs: [Train_imgs]

# Split logic
split_mode: final_80_10_10 # iter_80_20 | final_80_10_10
split_manifest_path: ./outputs/splits/gleason_consensus_split_80_10_10.json
enforce_val_class_presence: true
val_min_g3_pos_images: 1
val_min_g4_pos_images: 1
val_min_g5_pos_images: 1
split_search_max_attempts: 100

# Loader robustness and tissue/background handling
renormalize_probs: true
enforce_background_ignore: true
# Downscale very large whole-slide style inputs before batching to avoid OOM on small GPUs.
max_long_side: 512
otsu_close_radius: 3
otsu_min_object_size: 4096
otsu_min_hole_size: 4096
probs_eps: 1e-8

# Train-time augmentation (MONAI, train split only)
transforms_enabled: true
transforms_profile: medium
transforms_seed_sync: true
transforms_patch_size: null
transforms_profiles:
  light:
    flip_h: 0.50
    flip_v: 0.50
    rotate90: 0.20
    affine: 0.15
    crop: 0.00
    scale_intensity: 0.15
    adjust_contrast: 0.10
    gaussian_noise: 0.10
    gaussian_smooth: 0.05
    shift_intensity: 0.05
  medium:
    flip_h: 0.50
    flip_v: 0.50
    rotate90: 0.30
    affine: 0.25
    crop: 0.00
    scale_intensity: 0.20
    adjust_contrast: 0.15
    gaussian_noise: 0.15
    gaussian_smooth: 0.10
    shift_intensity: 0.10
  strong:
    flip_h: 0.50
    flip_v: 0.50
    rotate90: 0.40
    affine: 0.35
    crop: 0.00
    scale_intensity: 0.25
    adjust_contrast: 0.20
    gaussian_noise: 0.20
    gaussian_smooth: 0.15
    shift_intensity: 0.15
transforms_prob: {}
transforms_affine_rotate_range: [0.12]
transforms_affine_translate_range: [32, 32]
transforms_affine_scale_range: [0.08, 0.08]
transforms_scale_intensity_factors: 0.10
transforms_adjust_contrast_gamma: [0.85, 1.15]
transforms_gaussian_noise_mean: 0.0
transforms_gaussian_noise_std: 0.03
transforms_gaussian_smooth_sigma_x: [0.25, 1.00]
transforms_gaussian_smooth_sigma_y: [0.25, 1.00]
transforms_shift_intensity_offsets: [-0.08, 0.08]

# Model
model: deconver
spatial_dims: 2
input_channels: 3
out_channels: 4
deep_supervision: false
deconver_encoder_depth: [1, 1, 1, 1]
deconver_encoder_width: [64, 128, 256, 512]
deconver_strides: [1, 2, 2, 2]
deconver_kernel_size: [5, 5]
deconver_groups: -1
deconver_ndc_ratio: 4
deconver_fp32_islands: true # keep Deconver update math in FP32 (safer on pre-BF16 GPUs)
deconver_fp32_scope: iterative_block # update_only | iterative_block

# Loss: soft-label CE/KL + hard Dice
soft_label_loss: ce
loss_variant: soft_dice # soft_dice | focal_dice | tversky_dice
lambda_soft: 1.0
lambda_dice: 1.0
loss_schedule_enabled: true
loss_schedule_transition_epoch: 15
lambda_soft_warmup: 1.3
lambda_dice_warmup: 0.7
lambda_soft_final: 0.8
lambda_dice_final: 1.2
use_confidence_mask: true
confidence_threshold: 0.70
include_background_in_dice: false
exclude_absent_classes_in_dice_loss: true
class_loss_weights: [1.0, 1.6, 1.3, 4.5]
grade5_boost: 2.0

# QC usage
qc_policy: warn_downweight
qc_fail_keys: [hard_fail, failed, qc_failed]
qc_suspicious_keys: [suspicious, needs_review]
qc_downweight_factor: 0.7
qc_per_rater_penalty: 0.1
qc_min_weight: 0.2

# Validation
val_every: 1
val_start_epoch: 1
eval_leave_one_rater_out: false

# Performance
use_amp: true
amp_dtype: fp16
use_compile: false

# Checkpointing
keep_last_checkpoints: 5

# Best checkpoint selection
best_ckpt_w_macro_dice: 0.45
best_ckpt_w_weighted_macro_dice: 0.15
best_ckpt_w_dice_g5: 0.30
best_ckpt_w_sensitivity: 0.10
best_ckpt_metric_source: raw # raw | post
nan_recovery_log_every: 1

# Early stopping
early_stopping_patience: 80
early_stopping_min_delta: 0.001

# Postprocessing (memory-neutral, label-space)
post_min_component_size_g3: 32
post_min_component_size_g4: 32
post_min_component_size_g5: 16

# CPU-side sampler balancing (memory-neutral)
oversample_tumor_positive_factor: 1.25
oversample_grade5_factor: 2.0
# hard_case_weights_path: ./outputs/hard_case_weights.json
oversample_hard_case_factor: 1.20

# Weights & Biases
wandb_enabled: true
wandb_mode: online # online | offline | disabled
wandb_project: prostate-lesion-segmentation
wandb_entity: ""
wandb_run_name: ""
wandb_group: deconver
wandb_tags: [deconver, consensus, segmentation]
wandb_log_config: true
wandb_strict: false

# Validation visualization
viz_enabled: true
viz_every_n_epochs: 5
viz_num_cases: 8
viz_output_subdir: val_viz
viz_log_wandb: true
viz_prediction_source: both # raw | post | both
